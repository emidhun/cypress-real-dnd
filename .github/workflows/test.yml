name: test

on:
  push:
    branches: [main]
  pull_request:

jobs:
  example-react-dnd:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        # Cypress 14 is on Electron 130, 15 is on Electron 138 — both Chromium
        # versions support Input.dispatchDragEvent so coverage is meaningful.
        cypress: ["^14", "^15"]
        # Chrome runs alongside Electron to verify the lsof-based port
        # discovery + AUT iframe translation works on both browser families.
        browser: [electron, chrome]
    name: "Cypress ${{ matrix.cypress }} / ${{ matrix.browser }}"
    steps:
      - uses: actions/checkout@v4

      - name: Use Node 20
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          # No cache: this repo has two package.json files (root + example)
          # and matrix-pinned Cypress versions; npm's cache key would miss.

      # 1. Install the plugin's own deps (chrome-remote-interface). Required
      #    so the `file:../..` link from the example resolves transitively.
      - name: Install plugin deps
        run: npm install

      # 2. Install the example app's deps.
      - name: Install example deps
        working-directory: examples/react-dnd
        run: npm install

      # 3. Pin Cypress to the matrix version. Overrides the example's
      #    `cypress: ^15` so we exercise both supported majors.
      - name: Pin Cypress version
        working-directory: examples/react-dnd
        run: npm install --no-save cypress@${{ matrix.cypress }}

      # 4. Start the Vite dev server in the background; wait until it's up.
      - name: Start example app (background)
        working-directory: examples/react-dnd
        run: |
          nohup npm run dev > /tmp/vite.log 2>&1 &
          for i in {1..30}; do
            if curl -fsS http://localhost:5173/ > /dev/null; then
              echo "vite up after ${i}s"; exit 0
            fi
            sleep 1
          done
          echo "vite did not start within 30s"; tail /tmp/vite.log; exit 1

      # 5. Run the Cypress suite headless against the dev server. The JSON
      #    reporter writes per-run stats (tests/passes/failures/duration) to
      #    results.json — the suite is a single spec, so there's no per-spec
      #    overwrite to merge.
      - name: Run Cypress
        id: cypress
        working-directory: examples/react-dnd
        run: |
          npx cypress run --browser ${{ matrix.browser }} --headless \
            --reporter json --reporter-options "output=results.json"

      # 6. Distil the report into a small summary the notify-slack job can
      #    aggregate. Runs even on failure so failed cells still report counts;
      #    falls back to a null-stats summary if Cypress crashed before writing.
      - name: Build run summary
        if: always()
        working-directory: examples/react-dnd
        run: |
          if [ -f results.json ]; then
            jq -c '{cell: "Cypress ${{ matrix.cypress }} / ${{ matrix.browser }}", result: "${{ steps.cypress.outcome }}", stats: .stats}' results.json > summary.json
          else
            printf '{"cell":"Cypress %s / %s","result":"%s","stats":null}\n' \
              '${{ matrix.cypress }}' '${{ matrix.browser }}' '${{ steps.cypress.outcome }}' > summary.json
          fi
          cat summary.json

      - name: Upload run summary
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: cypress-summary-${{ matrix.cypress }}-${{ matrix.browser }}
          path: examples/react-dnd/summary.json
          retention-days: 7

      - name: Upload Cypress artifacts on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: cypress-artifacts-${{ matrix.cypress }}-${{ matrix.browser }}
          path: |
            examples/react-dnd/cypress/screenshots
            examples/react-dnd/cypress/videos
            /tmp/vite.log
          retention-days: 7
          if-no-files-found: ignore

  # Post a single summary to Slack after the whole matrix finishes, pass or
  # fail. `if: always()` ensures it runs even when a matrix cell failed;
  # `needs.example-react-dnd.result` aggregates across all matrix cells
  # (success only if every cell passed).
  notify-slack:
    needs: example-react-dnd
    if: always()
    runs-on: ubuntu-latest
    steps:
      # Each matrix cell uploaded its own cypress-summary-* artifact. Pull them
      # all in; download-artifact@v4 puts each in its own subdirectory.
      - name: Download run summaries
        uses: actions/download-artifact@v4
        with:
          pattern: cypress-summary-*
          path: summaries

      # Aggregate the per-cell summaries into a complete Block Kit payload
      # (including a per-cell pass/fail/duration breakdown and totals). Writing
      # the full JSON to a file sidesteps YAML-interpolation issues with
      # multi-line, dynamically-built content.
      - name: Build Slack payload
        env:
          CHANNEL: ${{ secrets.SLACK_CHANNEL_ID }}
          OVERALL: ${{ needs.example-react-dnd.result }}
          REPO: ${{ github.repository }}
          BRANCH: ${{ github.ref_name }}
          ACTOR: ${{ github.actor }}
          EVENT: ${{ github.event_name }}
          SHA: ${{ github.sha }}
          SERVER_URL: ${{ github.server_url }}
          RUN_ID: ${{ github.run_id }}
        run: node .github/scripts/build-slack-payload.js

      - name: Post result to Slack
        uses: slackapi/slack-github-action@v2.1.0
        with:
          method: chat.postMessage
          token: ${{ secrets.SLACK_BOT_TOKEN }}
          # Fail the step (and surface the Slack API error) instead of
          # silently swallowing ok:false responses like not_in_channel.
          errors: true
          payload-file-path: payload.json
